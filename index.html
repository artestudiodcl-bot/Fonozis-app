<script>
document.getElementById("btn").onclick = async () => {

    let info = "";

    info += "Notification: " + ("Notification" in window) + "<br>";
    info += "ServiceWorker: " + ("serviceWorker" in navigator) + "<br>";
    info += "PushManager: " + ("PushManager" in window) + "<br>";

    document.getElementById("resultado").innerHTML = info;

};
</script>
