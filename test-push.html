<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jam Push Test</title>
</head>
<body>

<h1>Jam Push Test</h1>

<button id="btn">Obtener Token</button>

<pre id="resultado"></pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQX_NpjKiXrxVOuAvjs_w_MvwixQ_dP9w",
  authDomain: "jam-97f48.firebaseapp.com",
  projectId: "jam-97f48",
  storageBucket: "jam-97f48.firebasestorage.app",
  messagingSenderId: "1083343441316",
  appId: "1:1083343441316:web:59a18d1ab0cc487099c531"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

document.getElementById("btn").onclick = async () => {
  const permission = await Notification.requestPermission();

  if(permission !== "granted") {
    alert("Permiso denegado");
    return;
  }

  try {
    const registration = await navigator.serviceWorker.register(
      '/Fonozis-app/firebase-messaging-sw.js' // ⚠ ruta completa relativa a tu repo
    );

    const token = await getToken(messaging, {
      vapidKey: "BIf6mLIG9E8tPHwrGT9hd7IBaavu1dUv6G7KxkB7DajkAy4Gd9mve0rqZNt0fnzgmZuko67DJXMJJJnoj47qR7g",
      serviceWorkerRegistration: registration
    });

    document.getElementById("resultado").innerHTML =
      "<b>TOKEN:</b><br>" + token;

  } catch(error) {
    document.getElementById("resultado").innerHTML =
      "ERROR:<br><br>" + error;
  }
};
</script>

</body>
</html>
